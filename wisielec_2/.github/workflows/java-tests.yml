name: Java Maven Tests

on:
  push:
    branches:
      - main
      - Alicja-Gracz_Slowa
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Pobranie kodu
        uses: actions/checkout@v4

      - name: Ustawienie JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Uruchomienie testow Maven
        run: mvn test